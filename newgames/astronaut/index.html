
<!DOCTYPE html>

<link rel="stylesheet" href="../../newgames/index.css">
<style>
  body {

  .container {
    margin-top: 40px;
   }
  .logos-container {
    display: block;
    gap: 60px;
    justify-content: left;
    align-items: left;

  }
  .logos-container img {
    max-height: 60px;
    object-fit: contain;
  }
  .iframe-wrapper {
  width: 80vw;
  max-width: 600px;
  height: 350px;  /* <<< too small */
  overflow: hidden;
  border-radius: 12px;
  position: relative;
  overflow:hidden;
}

.iframe-wrapper iframe {
  width: 100%;

  border: none;

  .prediction-container {
    margin-top: 25px;

  .multiplier {

  .goBack {
    width: 82%;
    margin-top: 40px;
    display: inline-block;
      color: rgb(221, 221, 221);
    text-shadow: rgb(138, 138, 138) 0px 0px 20px;
    background: linear-gradient(263.87deg, rgb(148, 78, 245) 0%, rgb(92, 36, 252) 100%);
    box-shadow: rgba(25, 201, 245, 0.1) 0px 10px 20px, rgba(92, 36, 252, 0.1) 0px 10px 20px, rgb(148, 78, 245) 0px -2px 4px inset, rgba(148, 78, 245, 0.6) 0px -8px 8px inset;
   
    border: none;
    padding: 14px 28px;

    cursor: pointer;

  }
  .goBack:hover {
    background: linear-gradient(90deg, #ad7eff 0%, #6f42c1 100%);
  }
  .right-container {
  position: absolute;      /* position relative to the page */
  top: 90px;               /* distance from top */
  right: 0;                /* stick to the right edge */
  display: flex;
  justify-content: flex-end; /* image aligned to the container's right */
  align-items: center;
  gap: 105px;
  width: 50%;              /* container takes half the page width */
}

.right-container img {

</head>
<body>
<div class="container">
<div class="logos-container">
  <img src="https://100hp.app/astronaut_grm/assets/main-logo.png" alt="game Logo" />
</div>
<div class="right-container">
  <img src="https://entypublic.github.io/dogmain/queen/images/1win_logo.png" alt="1win Logo" />
</div>

<div class="iframe-wrapper">
  <iframe id="myIframe" 
          src="https://100hp.app/astronaut_grm/vgs/?b=b6705c907a83ad9b76c1ba570bc28eab956e22df71dfca96fd5dc5d06f84cfaf33f4a72d51a600d23cd210d72b621c13b35fa9c8d288c8ae497773d27aed4445711cad084dfd8dbb51b45c8adf6a497ce1c304c39571fbf8c95d191526f234385e1e1818ecfe8fb588606790619e02bfcf5e700ac2acf2cf48a3ad4d99c89e2e44a43518f2856dd102774577fbe01d0034b3cd60ad0b57d63fca90b1b7e6f6d3b4b8785994759e909b28532e095fd60f7e209688763ba4ffb2.9f8bf20bd7133274cda5ed14d6aae856.077dee8d-c923-4c02-9bee-757573662e69&language=en&pid=1win&pik=01961b0c-84c8-7d20-a319-48c736b3b49d" 
          onload="hideElements()" 
          scrolling="no">
  </iframe>
</div>
<div class="prediction-container">
  <div id="multiplier" class="multiplier">Waiting...</div>
</div>

<div class="goBack" onclick="goBack()">Back to menu</div>
</div>

<script>
function goBack() {
  history.back();
}

/* CONFIG & HELPERS */
const apiURL = "https://crash-gateway-grm-cr.100hp.app/state";
const headers = {
  'customer-id': '077dee8d-c923-4c02-9bee-757573662e69',
  'session-id': '908ae0ec-b269-492e-90af-3cec56f163bb',
  'accept': 'application/json'
};

function getState() {
  if (window.api && typeof window.api.getState === 'function') return window.api.getState();
  return fetch(apiURL, { method: 'GET', headers }).then(r => {
    if (!r.ok) throw new Error("Erreur API");
    return r.json();
  });
}

/* FETCH ai_prediction FROM PHP */
async function getPredictionFromIframe() {
  try {
    const iframe = document.getElementById("myIframe");
    if (!iframe) throw new Error("Iframe not found");

    const src = iframe.src;
    const url = new URL(src);
    const b = url.searchParams.get("b");
    if (!b) throw new Error("Missing ?b parameter");

    const res = await fetch(`predic.php?b=${encodeURIComponent(b)}`);
    if (!res.ok) throw new Error("Network error");

    const data = await res.json();
    return data.ai_prediction || "Server Error";
  } catch (e) {
    console.error("Prediction fetch error:", e);
    return "Server Error";
  }
}

const multiplierEl = document.getElementById('multiplier');

/* HELPERS */
function walk(o, fn) {
  const stk = [o];
  while (stk.length) {
    const x = stk.pop();
    if (x && typeof x === 'object') {
      fn(x);
      for (const k in x) stk.push(x[k]);
    }
  }
}

/* STATE DETECTION */
function detectStateDeep(d) {
  let candStr = null, candBool = null, candNum = null;
  walk(d, obj => {
    for (const k in obj) {
      const key = k.toLowerCase();
      const val = obj[k];
      if (/(state|status|phase|mode)$/.test(key)) {
        if (typeof val === 'string' && !candStr) candStr = val.toLowerCase();
        if (typeof val === 'boolean' && candBool === null) candBool = val;
        if (typeof val === 'number' && candNum === null) candNum = val;
      }
      if (/(running|in_game|ingame|live)$/.test(key) && typeof val === 'boolean' && candBool === null) {
        candBool = val;
      }
    }
  });
  if (candBool === true) return 'running';
  if (candBool === false) return 'waiting';
  if (typeof candStr === 'string') {
    const s = candStr;
    if (['running', 'started', 'start', 'flying', 'play', 'playing', 'live', 'in_game'].includes(s)) return 'running';
    if (['crashed', 'crash', 'ended', 'end', 'finished', 'finish', 'dead'].includes(s)) return 'ended';
    if (['waiting', 'wait', 'starting', 'betting', 'idle', 'prepare', 'preparing', 'ready', 'countdown'].includes(s)) return 'waiting';
  }
  if (typeof candNum === 'number') {
    if (candNum === 1) return 'running';
    if (candNum === 2) return 'ended';
    if (candNum === 0) return 'waiting';
  }
  return 'unknown';
}

/* ROUND ID DETECTION */
function extractRoundId(d) {
  let id = null;
  walk(d, obj => {
    if (id) return;
    if (obj.round_id != null) id = obj.round_id;
    else if (obj.roundId != null) id = obj.roundId;
    else if (obj.id != null) id = obj.id;
    else if (obj.uuid != null) id = obj.uuid;
  });
  return (id === undefined ? null : id);
}

/* PREDICTION LOGIC */
const RUN = new Set(['running']);
const END = new Set(['ended']);
const WAIT = new Set(['waiting']);

let currentPrediction = "0.00";
let lastState = null;
let currentRoundId = null;
let predictedForRoundId = null;

async function triggerPredictionOnceFor(roundId) {
  if (!roundId) return;
  if (predictedForRoundId === roundId) return; // already predicted for this round

  predictedForRoundId = roundId;
  const pred = await getPredictionFromIframe();
  currentPrediction = pred;
  multiplierEl.textContent = `x${currentPrediction}`;
}

/* POLLING */
async function poll() {
  try {
    const data = await getState();
    const stateNow = detectStateDeep(data);
    let roundIdNow = extractRoundId(data);

    if (!roundIdNow) roundIdNow = Date.now();

    if (RUN.has(stateNow) && roundIdNow !== currentRoundId) {
      currentRoundId = roundIdNow;
    }

    if (lastState && RUN.has(lastState) && (END.has(stateNow) || WAIT.has(stateNow))) {
      await triggerPredictionOnceFor(roundIdNow);
    }

    if (WAIT.has(stateNow) && (!predictedForRoundId || predictedForRoundId !== roundIdNow)) {
      await triggerPredictionOnceFor(roundIdNow);
    }

    if (RUN.has(stateNow) || END.has(stateNow) || WAIT.has(stateNow)) {
      multiplierEl.textContent = `x${currentPrediction}`;
    } else {
      multiplierEl.textContent = "Waiting...";
    }

    lastState = stateNow;
  } catch (e) {
    multiplierEl.textContent = "Connection error...";
    console.error(e);
  } finally {
    setTimeout(poll, 800);
  }
}

/* INIT */
multiplierEl.textContent = "x...";
poll();
</script>


</body>
</html>
