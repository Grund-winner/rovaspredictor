  <script>
    let signalActive = false;
    let nextSignalTime = null;
    let secondSignalTime = null;
    let countdownInterval = null;
    let predictionData = null;
    let verificationTimeout = null;
    let verificationInterval = null;

    // Configuration de l'API
    const apiURL = "https://crash-gateway-grm-cr.100hp.app/state";
const headers = {
  'customer-id': '077dee8d-c923-4c02-9bee-757573662e69',
  'session-id': '7c578eec-5a8f-4f05-8457-fe7da4029eee',
  'accept': 'application/json'
};

    // Fonction pour récupérer les données de l'API
    async function fetchGameData() {
      try {
        const response = await fetch(apiURL, { headers });
        if (!response.ok) throw new Error('Erreur API');
        return await response.json();
      } catch (error) {
        console.error('Erreur lors de la récupération des données:', error);
        return null;
      }
    }

    // Fonction pour générer des coefficients dans la plage spécifiée
    function generateOptimizedCoefficients() {
      // Coefficient de gauche: 85% entre 2.10-2.58, 15% entre 2.59-3.00
      // Coefficient de droite: entre 3.86 et 8.30
      
      const random = Math.random();
      let leftCoeff, rightCoeff;
      
      if (random < 0.85) {
        // 85% du temps: entre 2.10 et 2.58
        leftCoeff = (Math.random() * (2.58 - 2.10) + 2.10).toFixed(2);
      } else {
        // 15% du temps: entre 2.59 et 3.00
        leftCoeff = (Math.random() * (3.00 - 2.59) + 2.59).toFixed(2);
      }
      
      // Coefficient de droite: toujours entre 3.86 et 8.30
      rightCoeff = (Math.random() * (8.30 - 3.86) + 3.86).toFixed(2);
      
      return { leftCoeff, rightCoeff };
    }

    // Fonction pour vérifier si la prédiction est validée
    function checkPredictionResult(currentCoefficient, predictedLeft, predictedRight) {
      const current = parseFloat(currentCoefficient);
      const left = parseFloat(predictedLeft);
      const right = parseFloat(predictedRight);
      
      // Vérification basée sur la première cote (prioritaire)
      if (current >= left && current <= right) {
        return {
          validated: true,
          hitTarget: current >= left ? 'first' : 'second',
          message: current === left ? 'VALIDÉ! (Première cote exacte)' : 
                   current === right ? 'VALIDÉ! (Deuxième cote exacte)' : 
                   'VALIDÉ! (Dans la plage)'
        };
      }
      
      return {
        validated: false,
        hitTarget: null,
        message: 'ÉCHEC! (Hors plage)'
      };
    }

    // Fonction pour surveiller les résultats de l'API
    function startPredictionVerification() {
      if (!predictionData || !nextSignalTime) return;
      
      const checkTime = () => {
        const now = new Date();
        
        // Vérifier si nous sommes dans la fenêtre de la première minute (prioritaire)
        const firstMinuteStart = new Date(nextSignalTime.getTime());
        const firstMinuteEnd = new Date(nextSignalTime.getTime() + 60000);
        
        // Vérifier si nous sommes dans la fenêtre de la deuxième minute
        const secondMinuteStart = new Date(secondSignalTime.getTime());
        const secondMinuteEnd = new Date(secondSignalTime.getTime() + 60000);
        
        if ((now >= firstMinuteStart && now <= firstMinuteEnd) || 
            (now >= secondMinuteStart && now <= secondMinuteEnd)) {
          
          // Récupérer les données actuelles de l'API
          fetchGameData().then(gameData => {
            if (gameData && gameData.history && gameData.history.length > 0) {
              const latestGame = gameData.history[0];
              const currentCoeff = parseFloat(latestGame.coefficient || latestGame.multiplier || 0);
              
              if (currentCoeff > 0) {
                const result = checkPredictionResult(
                  currentCoeff, 
                  predictionData.leftCoeff, 
                  predictionData.rightCoeff
                );
                
                console.log(`Vérification: Coefficient actuel: ${currentCoeff}x | Prédiction: ${predictionData.leftCoeff}x - ${predictionData.rightCoeff}x`);
                
                // Déterminer quelle minute a été touchée
                let timeInfo = '';
                if (now >= firstMinuteStart && now <= firstMinuteEnd) {
                  timeInfo = ' (1ère minute - Prioritaire)';
                } else if (now >= secondMinuteStart && now <= secondMinuteEnd) {
                  timeInfo = ' (2ème minute)';
                }
                
                // Afficher le résultat dans la box
                displayVerificationResult(result, currentCoeff, timeInfo);
                
                // Arrêter la vérification
                clearInterval(verificationInterval);
              }
            }
          });
        }
        
        // Arrêter la vérification après la deuxième minute
        if (now > secondMinuteEnd) {
          clearInterval(verificationInterval);
          console.log('Fenêtre de vérification expirée');
        }
      };
      
      // Vérifier toutes les 5 secondes
      verificationInterval = setInterval(checkTime, 5000);
      
      // Arrêter après 5 minutes maximum
      setTimeout(() => {
        if (verificationInterval) {
          clearInterval(verificationInterval);
        }
      }, 5 * 60 * 1000);
    }

    // Fonction pour afficher le résultat de vérification
    function displayVerificationResult(result, currentCoeff, timeInfo) {
      const box = document.getElementById('coefficientBox');
      const originalContent = box.textContent;
      
      // Afficher le résultat
      if (result.validated) {
        box.style.backgroundColor = '#4CAF50';
        box.style.color = 'white';
        box.textContent = `✅ ${result.message}${timeInfo}\nCoefficient: ${currentCoeff}x`;
      } else {
        box.style.backgroundColor = '#f44336';
        box.style.color = 'white';
        box.textContent = `❌ ${result.message}${timeInfo}\nCoefficient: ${currentCoeff}x`;
      }
      
      // Remettre le contenu original après 10 secondes
      clearTimeout(verificationTimeout);
      verificationTimeout = setTimeout(() => {
        box.style.backgroundColor = '';
        box.style.color = '';
        box.textContent = originalContent;
      }, 10000);
    }
    function analyzeCoefficientHistory(lastCoefficients) {
      // Utiliser la nouvelle logique de génération optimisée
      const coefficients = generateOptimizedCoefficients();
      
      // Calculer la moyenne des 5 derniers pour la console
      const last5 = lastCoefficients.slice(-5);
      const average = last5.reduce((sum, coeff) => sum + coeff, 0) / last5.length;
      
      // Chance entre 94% et 98%
      const chance = Math.floor(Math.random() * 5) + 94; // 94-98%

      return { 
        leftCoeff: coefficients.leftCoeff, 
        rightCoeff: coefficients.rightCoeff, 
        chance, 
        average: average.toFixed(2) 
      };
    }

    // Fonction pour générer un délai aléatoire entre 1 et 3 minutes
    function generateRandomDelay() {
      // Génère un nombre aléatoire entre 1 et 3 (inclus)
      return Math.floor(Math.random() * 3) + 1;
    }

    // Fonction pour mettre à jour l'heure
    function updateTime() {
      const now = new Date();
      
      if (signalActive && nextSignalTime && secondSignalTime) {
        // Afficher l'heure de prédiction sans les secondes (HH:MM format)
        const firstTime = nextSignalTime.toLocaleTimeString('fr-FR', { 
          hour: '2-digit', 
          minute: '2-digit', 
          hour12: false 
        });
        const secondTime = secondSignalTime.toLocaleTimeString('fr-FR', { 
          hour: '2-digit', 
          minute: '2-digit', 
          hour12: false 
        });
      //  document.getElementById('timeDisplay').textContent = `${firstTime} - ${secondTime}`;
      } else {
        // Afficher 00:00 quand aucun signal n'est actif
        //document.getElementById('timeDisplay').textContent = '00:00 - 00:00';
      }
    }

    // Fonction pour le compte à rebours
    function startCountdown() {
      const countdownEnd = new Date(Date.now() + 2 * 60 * 1000); // 3 minutes
      
      countdownInterval = setInterval(() => {
        const now = new Date();
        const timeLeft = countdownEnd - now;
        
        if (timeLeft <= 0) {
          // Le signal est terminé, permettre un nouveau signal
          clearInterval(countdownInterval);
          document.getElementById('newSignalBtn').disabled = false;
          document.getElementById('newSignalBtn').textContent = 'NOUVEAU SIGNAL';
          document.getElementById('statusDisplay').textContent = 'Signal prêt!';
          document.getElementById('statusDisplay').className = 'status-ready';
          signalActive = false;
          nextSignalTime = null;
          secondSignalTime = null;
          predictionData = null;
          
          // Nettoyer les intervalles de vérification
          if (verificationInterval) {
            clearInterval(verificationInterval);
            verificationInterval = null;
          }
          if (verificationTimeout) {
            clearTimeout(verificationTimeout);
            verificationTimeout = null;
          }
          
          // Remettre à zéro
          document.getElementById('coefficientBox').textContent = '00.00X - 00.00X';
          document.getElementById('chanceDisplay').textContent = '00%';
          document.getElementById('progressFill').style.width = '0%';
          
          // Remettre l'heure à 00:00
          updateTime();
        } else {
          // Afficher le temps restant
          const minutesLeft = Math.floor(timeLeft / 60000);
          const secondsLeft = Math.floor((timeLeft % 60000) / 1000);
          document.getElementById('newSignalBtn').textContent = `NEXT SIGNAL: ${minutesLeft}:${secondsLeft.toString().padStart(2, '0')}`;
        }
      }, 1000);
    }

    // Fonction pour générer un nouveau signal avec analyse API
    async function generateNewSignal() {
  if (signalActive) return;

  document.getElementById('statusDisplay').textContent = 'Analysis in progress ...';
  document.getElementById('statusDisplay').className = 'status-analyzing pulsing';
  document.getElementById('newSignalBtn').disabled = true;
  document.getElementById('newSignalBtn').textContent = 'ANALYSE...';

  let prediction;

  // 🔥 NEW API PREDICTION LOGIC
  try {
    function getUserTimeZone() {
  let tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

  // Normalize legacy / deprecated zones
  const normalizeMap = {
    "Asia/Calcutta": "Asia/Kolkata",
    "US/Eastern": "America/New_York",
    "US/Central": "America/Chicago",
    "US/Mountain": "America/Denver",
    "US/Pacific": "America/Los_Angeles",
    "Europe/Kiev": "Europe/Kyiv"
  };

  return normalizeMap[tz] || tz;
}

const timezone = getUserTimeZone();

// OPTIONAL: send UTC offset too (extra safety)
const offsetMinutes = -new Date().getTimezoneOffset();
const offset =
  (offsetMinutes >= 0 ? "+" : "-") +
  String(Math.floor(Math.abs(offsetMinutes) / 60)).padStart(2, "0") +
  ":" +
  String(Math.abs(offsetMinutes) % 60).padStart(2, "0");

const response = await fetch(
  `aviator.php?b=b6705c907a83ad9b76c1ba570bc28eab956e22df71dfca96fd5dc5d06f84cfaf33f4a72d51a600d23cd210d72b621c13b35fa9c8d288c8ae497773d27aed4445711cad084dfd8dbb51b45c8adf6a497ce1c304c39571fbf8c95d191526f234385e1e1818ecfe8fb588606790619e02bfcf5e700ac2acf2cf48a3ad4d99c89e2e44a43518f2856dd102774577fbe01d0034b3cd60ad0b57d63fca90b1b7e6f6d3b4b8785994759e909b28532e095fd60f7e209688763ba4ffb2.9f8bf20bd7133274cda5ed14d6aae856.077dee8d-c923-4c02-9bee-757573662e69&language=en&pid=1win&pik=01961b0c-84c8-7d20-a319-48c736b3b49d&t=${encodeURIComponent(timezone)}&offset=${offset}`
);


console.log("Timezone:", timezone);



      const apiData = await response.json();
// Show time window from API
document.getElementById("apiTimeWindow").textContent = apiData.time_window || "--:--";

      console.log("API DATA:", apiData);

      prediction = {
  leftCoeff: parseFloat(apiData.manual_prediction.coeff).toFixed(2),
  rightCoeff: parseFloat(apiData.ai_prediction).toFixed(2),
  chance: Math.max(90, apiData.manual_prediction.confidence)
};

  } catch (err) {
      console.error("API failed → fallback", err);

      const coefficients = generateOptimizedCoefficients();
      prediction = {
          leftCoeff: coefficients.leftCoeff,
          rightCoeff: coefficients.rightCoeff,
          chance: Math.floor(Math.random() * 5) + 94
      };
  }

  // Existing delay, signal activation, UI updates → unchanged
  setTimeout(() => {
      signalActive = true;

      const randomMinutes = generateRandomDelay();
      const now = new Date();
      nextSignalTime = new Date(now.getTime() + randomMinutes * 60 * 1000);
      secondSignalTime = new Date(nextSignalTime.getTime() + 60 * 1000);

      predictionData = {
          leftCoeff: prediction.leftCoeff,
          rightCoeff: prediction.rightCoeff,
          chance: prediction.chance,
          generatedAt: new Date()
      };

      document.getElementById('coefficientBox').textContent = `${prediction.leftCoeff}X - ${prediction.rightCoeff}X`;
      document.getElementById('chanceDisplay').textContent = `${prediction.chance}%`;
      document.getElementById('progressFill').style.width = `${prediction.chance}%`;

      document.getElementById('statusDisplay').textContent = 'Signal active!';
      document.getElementById('statusDisplay').className = 'status-active pulsing';

      updateTime();
      startPredictionVerification();
      startCountdown();

  }, 10000);
}

    // Fonction pour aller au jeu
    function goToGame() {
      window.open('https://1wlvkt.life/?p=9wd5', '_blank');
    }

    // Initialisation
    document.addEventListener('DOMContentLoaded', function() {
      updateTime();
      // Mettre à jour l'heure toutes les secondes seulement si un signal est actif
      setInterval(() => {
        if (signalActive) {
          updateTime();
        }
      }, 1000);
    });
  </script>
