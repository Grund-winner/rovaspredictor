let historyDataPred = [];

function calculateMovingAverage(data, window) {
  if (data.length < window) return data[data.length - 1] || 1.5;
  const slice = data.slice(-window);
  return slice.reduce((a, b) => a + b, 0) / slice.length;
}

function calculateEWMA(data, alpha = 0.3) {
  if (data.length === 0) return 1.5;
  let ewma = data[0];
  for (let i = 1; i < data.length; i++) {
    ewma = alpha * data[i] + (1 - alpha) * ewma;
  }
  return ewma;
}

function calculateVolatility(data) {
  if (data.length < 2) return 0;
  const mean = data.reduce((a, b) => a + b, 0) / data.length;
  const variance = data.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / data.length;
  return Math.sqrt(variance);
}

function detectTrend(data, window = 10) {
  if (data.length < window) return 0;
  const recent = data.slice(-window);
  let inc = 0;
  for (let i = 1; i < recent.length; i++) {
    if (recent[i] > recent[i - 1]) inc++;
  }
  return (inc / (recent.length - 1)) - 0.5;
}

function calculateMomentum(data, period = 5) {
  if (data.length < period + 1) return 0;
  const cur = data[data.length - 1];
  const past = data[data.length - period - 1];
  return (cur - past) / past;
}

function ensemblePrediction(history) {
  if (history.length < 10) return (1.2 + Math.random() * 1.5);

  const volatility = calculateVolatility(history.slice(-20));
  const alpha = Math.max(0.1, Math.min(0.5, volatility / 2));
  const ewmaPred = calculateEWMA(history, alpha);

  const trend = detectTrend(history, 15);
  const recentAvg = calculateMovingAverage(history, 10);
  const trendPred = recentAvg * (1 + trend * 0.2);

  const momentum = calculateMomentum(history, 7);
  const momentumPred = history[history.length - 1] * (1 + momentum * 0.3);

  const mean = history.reduce((a, b) => a + b, 0) / history.length;
  const last = history[history.length - 1];
  const meanRev = last + (mean - last) * 0.3;

  let val =
    ewmaPred * 0.4 +
    trendPred * 0.2 +
    momentumPred * 0.2 +
    meanRev * 0.2;

  return Math.max(1.01, Math.min(val, 5));
}

async function showPrediction() {
  const value = await currentPrediction;
  multiplierEl.textContent = value === "Server Error" 
    ? "Server Error" 
    : `x${value ?? "N/A"}`;
}

function walk(o, fn) {
  const stk = [o];
  while (stk.length) {
    const x = stk.pop();
    if (x && typeof x === 'object') {
      fn(x);
      for (const k in x) stk.push(x[k]);
    }
  }
}

function detectStateDeep(d) {
  let candStr = null, candBool = null, candNum = null;
  walk(d, obj => {
    for (const k in obj) {
      const key = k.toLowerCase();
      const val = obj[k];
      if (/(state|status|phase|mode)$/.test(key)) {
        if (typeof val === 'string' && !candStr) candStr = val.toLowerCase();
        if (typeof val === 'boolean' && candBool === null) candBool = val;
        if (typeof val === 'number' && candNum === null) candNum = val;
      }
      if (/(running|in_game|ingame|live)$/.test(key) && typeof val === 'boolean' && candBool === null) {
        candBool = val;
      }
    }
  });
  if (candBool === true) return 'running';
  if (candBool === false) return 'waiting';
  if (typeof candStr === 'string') {
    const s = candStr;
    if (['running','started','start','flying','play','playing','live','in_game'].includes(s)) return 'running';
    if (['crashed','crash','ended','end','finished','finish','dead'].includes(s)) return 'ended';
    if (['waiting','wait','starting','betting','idle','prepare','preparing','ready','countdown'].includes(s)) return 'waiting';
  }
  if (typeof candNum === 'number') {
    if (candNum === 1) return 'running';
    if (candNum === 2) return 'ended';
    if (candNum === 0) return 'waiting';
  }
  return 'unknown';
}

function extractRoundId(d) {
  let id = null;
  walk(d, obj => {
    if (id) return;
    if (obj.round_id != null) id = obj.round_id;
    else if (obj.roundId != null) id = obj.roundId;
    else if (obj.id != null) id = obj.id;
    else if (obj.uuid != null) id = obj.uuid;
  });
  return (id === undefined ? null : id);
}

const RUN = new Set(['running']);
const END = new Set(['ended']);
const WAIT = new Set(['waiting']);

let currentPrediction = generatePrediction();
let lastState = null;
let currentRoundId = null;
let predictedForRoundId = null;

async function triggerPredictionOnceFor(roundId) {
  if (!roundId) return;
  if (predictedForRoundId === roundId) return; 
  currentPrediction = generatePrediction();
  predictedForRoundId = roundId;
  await showPrediction();
}

async function poll() {
  try {
    const data = await getState();
    const stateNow = detectStateDeep(data);
    let roundIdNow = extractRoundId(data);
    if (!roundIdNow) roundIdNow = Date.now();

    if (RUN.has(stateNow) && roundIdNow !== currentRoundId) {
      currentRoundId = roundIdNow;
    }

    if (lastState && RUN.has(lastState) && (END.has(stateNow) || WAIT.has(stateNow))) {
      await triggerPredictionOnceFor(roundIdNow);
    }

    if (WAIT.has(stateNow) && (!predictedForRoundId || predictedForRoundId !== roundIdNow)) {
      await triggerPredictionOnceFor(roundIdNow);
    }

    if (RUN.has(stateNow) || END.has(stateNow) || WAIT.has(stateNow)) {
      await showPrediction();
    } else {
      multiplierEl.textContent = "Waiting...";
    }

    lastState = stateNow;
  } catch (e) {
    multiplierEl.textContent = "Connection error...";
    console.error("Polling error:", e);
  } finally {
    setTimeout(poll, 800);
  }
}

showPrediction();
poll();
