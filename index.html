  <style>
    * { 
      padding: 0; 
      margin: 0; 
      box-sizing: border-box; 
    }

    body { 
      position: relative; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      background: linear-gradient(135deg, #1E275B 0%, #12193D 100%);
      font-family: 'Kanit', sans-serif; 
      color: #ffffff; 
      overflow-x: hidden;
    }

    /* Header Styles */
    .header {
      height: 180px;
      width: 100%;
      position: relative;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .header-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 180px;
      height: 180px;
      opacity: 0.7;
      z-index: 0;
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .header__title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 1px;
    }

    .header__text {
      font-size: 20px;
      color: #AAB4E0;
      font-family:bold;
      font-weight: 300;
    }

    /* Search Container */
    .search-container {
      position: relative;
      margin: 15px 0 10px;
      width: 100%;
      max-width: 400px;
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      padding: 12px 50px 12px 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      font-size: 14px;
      color: white;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .search-input:focus {
      border-color: #00dcdc;
      box-shadow: 0 0 10px rgba(0, 220, 220, 0.3);
      background: rgba(255, 255, 255, 0.15);
    }

    .search-input::placeholder {
      color: #AAB4E0;
    }

    .search-btn {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(to right, #00dcdc, #00b4b4);
      color: #0A0F23;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .search-btn:hover {

      box-shadow: 0 0 10px rgba(0, 220, 220, 0.5);
    }

    .search-results-count {
      margin-top: 8px;
      font-size: 14px;
      color: #AAB4E0;
      text-align: center;
    }

    /* Games List */
    .games-list {
      position: relative;
      background: #1A2255;

      box-shadow: 0px -15px 20px 10px rgba(0, 220, 220, 0.23);

      display: grid;
      gap: 20px 12px;
      grid-template-columns: 1fr 1fr;
      transition: all 0.3s ease;

    }

    /* Fix for search active state */
    .games-list.search-active {
      padding-top: 20px !important;
      margin-top: 0 !important;
    }

    .games-list__ellipce {
      position: absolute;
      left: calc(50% - 15px);

      width: 30px;

    }

    .game-list__game {

    .game-list__img {

    }

    .dot.active {

    }

    .hamburger div {

      height: 3px;
      background-color: white;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .hamburger.active div:nth-child(1) {
      transform: rotate(45deg) translate(6px, 6px);

    .hamburger.active div:nth-child(2) {

<script>
window.onload = function() {
  let loader = document.getElementById("preloader");
  loader.classList.add("hidden"); // fade-out smoothly
}

document.addEventListener("DOMContentLoaded", () => {
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');

  const piraterBtn      = document.getElementById('piraterBtn');
  const piraterModal    = document.getElementById('piraterModal');
  const modalClose      = document.getElementById('modalClose');
  const predictBtn      = document.getElementById('predictBtn');
  const predictionResult= document.getElementById('predictionResult');
  const gamesList       = document.getElementById('gamesList');
  
  // Search elements
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const resultsCount = document.getElementById('resultsCount');

  // Store original games for filtering
  let originalGames = [];
  let filteredGames = [];

  // PAGINATION VARIABLES
  const GAMES_PER_PAGE = 32;
  let currentPage = 1;

  // ✅ Ensure sidebar is closed on page load
  sidebar.classList.remove('open');
  hamburger.classList.remove('active');

  // ✅ Sidebar toggle
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    sidebar.classList.toggle('open');
  });

  // Modal functionality
  piraterBtn.addEventListener('click', () => {
    piraterModal.style.display = 'flex';
    sidebar.classList.remove('open');
    hamburger.classList.remove('active');
  });

  modalClose.addEventListener('click', () => {
    piraterModal.style.display = 'none';
  });

  window.addEventListener('click', (e) => {
    if (e.target === piraterModal) piraterModal.style.display = 'none';
  });

  // Prediction
  predictBtn.addEventListener('click', () => {
    const coeff1 = parseFloat(document.getElementById('coeff1').value) || 0;
    const coeff2 = parseFloat(document.getElementById('coeff2').value) || 0;
    const coeff3 = parseFloat(document.getElementById('coeff3').value) || 0;

    const avg = (coeff1 + coeff2 + coeff3) / 3;
    const randomFactor = 0.8 + Math.random() * 0.4;
    const predictedCoeff = (avg * randomFactor).toFixed(2);

    document.getElementById('predictedCoeff').textContent = predictedCoeff;
    document.getElementById('predictedTime').textContent =
      `Dans ${Math.floor(Math.random() * 60)} secondes`;
    predictionResult.style.display = 'block';

    predictionResult.style.animation = 'none';
    setTimeout(() => {
      predictionResult.style.animation = 'fadeIn 0.5s ease-out';
    }, 10);
  });

  // Function to get paginated games
  function getPaginatedGames(games) {
    const startIndex = (currentPage - 1) * GAMES_PER_PAGE;
    const endIndex = startIndex + GAMES_PER_PAGE;
    return games.slice(startIndex, endIndex);
  }

  // Function to update pagination buttons
  function updatePagination(totalGames) {
    // Remove existing pagination container if any
    const existingPagination = document.querySelector('.pagination-container');
    if (existingPagination) {
      existingPagination.remove();
    }

    const totalPages = Math.ceil(totalGames / GAMES_PER_PAGE);
    
    // Don't show pagination if only one page
    if (totalPages <= 1) {
      return;
    }

    // Create pagination container
    const paginationContainer = document.createElement('div');
    paginationContainer.className = 'pagination-container';
    
    const prevButton = document.createElement('button');
    prevButton.className = 'pagination-btn prev-btn';
    prevButton.innerHTML = '<i class="fas fa-chevron-left"></i> previous ';
    prevButton.disabled = currentPage === 1;
    
    const pageInfo = document.createElement('span');
    pageInfo.className = 'page-info';
    pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
    document.querySelector(".header__text").textContent = `VERSION ${currentPage}`;
    const nextButton = document.createElement('button');
    nextButton.className = 'pagination-btn next-btn';
    nextButton.innerHTML = 'Next <i class="fas fa-chevron-right"></i>';
    nextButton.disabled = currentPage === totalPages;
    
    prevButton.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderPaginatedGames();
        document.querySelector(".header").scrollIntoView({ behavior: "smooth" });
      }
    });
    
    nextButton.addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderPaginatedGames();
        document.querySelector(".header").scrollIntoView({ behavior: "smooth" });
      }
    });
    
    paginationContainer.appendChild(prevButton);
    paginationContainer.appendChild(pageInfo);
    paginationContainer.appendChild(nextButton);
    
    // Insert pagination after gamesList
    gamesList.parentNode.insertBefore(paginationContainer, gamesList.nextSibling);
  }

  // Function to render games (original logic preserved)
  function renderGames(games) {
    gamesList.innerHTML = '';
    
    if (games.length === 0) {
      // Show no results message
      gamesList.innerHTML = `<div class="no-results">
        <i class="fas fa-search"></i>
        <p>Aucun jeu trouvé pour votre recherche</p>
      </div>`;
      return;
    }
    
    games.forEach((game, index) => {
      const gameDiv = document.createElement('div');
      gameDiv.classList.add('game-list__game');
      gameDiv.style.animationDelay = `${index * 0.1}s`;

      const gameLink = document.createElement('a');
      gameLink.href = game.link;

      const gameImg = document.createElement('img');
      gameImg.src = game.img;
      gameImg.alt = game.alt;
      gameImg.classList.add('game-list__img');

      const gameTitle = document.createElement('p');
      gameTitle.classList.add('game-list__title');
      gameTitle.textContent = game.title;

      // Tag last 2 games as NEW (only for full unfiltered list)
      if (games === filteredGames && games.length >= 2 && 
          index >= games.length - 2 && games === getPaginatedGames(originalGames)) {
        const gameTag = document.createElement('div');
        gameTag.classList.add('game-tag');
        gameTag.textContent = "NEW";
        gameDiv.appendChild(gameTag);
      }

      gameLink.appendChild(gameImg);
      gameDiv.appendChild(gameLink);
      gameDiv.appendChild(gameTitle);
      gamesList.appendChild(gameDiv);
    });
  }

  // New render function that handles pagination
  function renderPaginatedGames() {
    const gamesToRender = getPaginatedGames(filteredGames);
    renderGames(gamesToRender);
    updatePagination(filteredGames.length);
  }

  // Search functionality (modified to reset pagination)
  function performSearch() {
    const searchTerm = searchInput.value.toLowerCase().trim();
    
    // Toggle search-active class based on search term
    if (searchTerm === '') {
      gamesList.classList.remove("search-active");
    } else {
      gamesList.classList.add("search-active");
    }
    
    if (searchTerm === '') {
      // If search is empty, show all games
      filteredGames = [...originalGames];
    } else {
      // Filter games based on search term
      filteredGames = originalGames.filter(game => 
        game.title.toLowerCase().includes(searchTerm) || 
        game.alt.toLowerCase().includes(searchTerm)
      );
    }
    
    // Reset to page 1 on search
    currentPage = 1;
    
    // Update results count
    updateResultsCount(filteredGames.length);
    
    // Render filtered games with pagination
    renderPaginatedGames();
  }

  function updateResultsCount(count) {
    if (searchInput.value.trim() === '') {
      resultsCount.textContent = '';
    } else {
      resultsCount.textContent = `${count} jeu${count !== 1 ? 'x' : ''} trouvé${count !== 1 ? 's' : ''}`;
    }
  }

  // Event listeners for search
  searchInput.addEventListener('input', performSearch);
  searchBtn.addEventListener('click', performSearch);
  
  // Allow pressing Enter to search
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      performSearch();
    }
  });

  // ✅ Clear gamesList before appending new games
  gamesList.innerHTML = '';

  // Load games from JSON
  fetch('admingjhdsgffx/games.json')
    .then(res => res.json())
    .then(savedGames => {
      originalGames = savedGames;
      filteredGames = [...originalGames];
      
      // Initial render with pagination
      renderPaginatedGames();
    })
    .catch(err => {
      console.error("Failed to load games JSON:", err);
      gamesList.innerHTML = `<div class="no-results">
        <i class="fas fa-exclamation-circle"></i>
        <p>Impossible de charger les jeux. Veuillez réessayer plus tard.</p>
      </div>`;
    });

  // Pagination dots (existing functionality)
  const dots = document.querySelectorAll('.dot');
  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      dots.forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
    });
  });
});
</script>
</body></html>
